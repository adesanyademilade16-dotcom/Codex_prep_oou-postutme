<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3d2599">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" sizes="32x32" href="/assets/icons/favicon-32.png">
<title>Custom Practice — Codex PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
  .subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .subject-card{padding:18px 14px;text-align:center;cursor:pointer;transition:.2s;border:1.5px solid var(--border);position:relative}
  .subject-card:hover{border-color:var(--violet2)}
  .subject-card.selected{border-color:var(--violet);background:var(--blue-soft)}
  .subject-card .si{font-size:1.5rem;margin-bottom:6px}
  .subject-card .sn{font-size:.86rem;font-weight:700}
  .subject-card .check{
    position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:5px;
    border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;
  }
  .subject-card.selected .check{background:var(--violet);border-color:var(--violet);color:#fff}
  .subject-card.selected .check .icon svg{width:11px;height:11px}

  #setupPanel{display:none;margin-top:6px}
  .time-options{display:flex;gap:8px;flex-wrap:wrap}
  .time-btn{
    flex:1;min-width:64px;padding:10px 6px;
    background:var(--bg-soft);border:1.5px solid var(--border);
    border-radius:9px;cursor:pointer;font-weight:700;font-size:.82rem;
    font-family:var(--font);color:var(--ink);
  }
  .time-btn.selected{background:var(--violet);color:#fff;border-color:var(--violet)}

  .count-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--border);
  }
  .count-row:last-of-type{border-bottom:none}
  .count-row .cr-label{display:flex;align-items:center;gap:8px;font-size:.86rem;font-weight:700}
  .count-row .cr-label .icon{color:var(--violet)}
  .count-row input{
    width:64px;padding:8px 6px;text-align:center;border:1.5px solid var(--border);
    border-radius:8px;font-family:var(--font);font-size:.88rem;font-weight:700;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">Codex <span>PREP</span></div>
  <div class="spacer"></div>
  <a class="icon-btn" href="mode-select.html">← Modes</a>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h1>Custom Practice</h1>
    <p>Pick as many subjects as you like.</p>
  </div>

  <div class="subject-grid" id="subjectGrid">
    <div class="card subject-card" data-key="PUTME_CHEMISTRY">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="flask"></div><div class="sn">Chemistry</div>
    </div>
    <div class="card subject-card" data-key="PUTME_PHYSICS">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="gear"></div><div class="sn">Physics</div>
    </div>
    <div class="card subject-card" data-key="PUTME_BIOLOGY">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="dna"></div><div class="sn">Biology</div>
    </div>
    <div class="card subject-card" data-key="PUTME_ENGLISH">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="book"></div><div class="sn">English</div>
    </div>
    <div class="card subject-card" data-key="PUTME_GENERAL_KNOWLEDGE">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="globe"></div><div class="sn">Gen. Knowledge</div>
    </div>
    <div class="card subject-card" data-key="PUTME_MATHEMATICS">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="calculator"></div><div class="sn">Mathematics</div>
    </div>
    <div class="card subject-card" data-key="PUTME_CRK">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="document"></div><div class="sn">CRK</div>
    </div>
    <div class="card subject-card" data-key="PUTME_LITERATURE">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="book"></div><div class="sn">Lit-in-English</div>
    </div>
    <div class="card subject-card" data-key="PUTME_ECONOMICS">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="chart"></div><div class="sn">Economics</div>
    </div>
    <div class="card subject-card" data-key="PUTME_COMMERCE">
      <div class="check"><span data-icon="check" class="icon" style="display:none"></span></div>
      <div class="si" data-icon="card"></div><div class="sn">Commerce</div>
    </div>
  </div>

  <div class="card" id="setupPanel">
    <h3 style="font-size:.95rem;margin-bottom:6px">Set up your session</h3>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:16px">Set how many questions you want from each subject.</p>
    <div id="perSubjectCounts"></div>
    <div class="field" style="margin-top:4px">
      <label>Time limit</label>
      <div class="time-options" id="timeOptions">
        <button type="button" class="time-btn" data-time="20">20 min</button>
        <button type="button" class="time-btn selected" data-time="30">30 min</button>
        <button type="button" class="time-btn" data-time="45">45 min</button>
        <button type="button" class="time-btn" data-time="60">60 min</button>
      </div>
    </div>
    <button class="btn btn-primary btn-block" id="startBtn">Start practice</button>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html"><span data-icon="home" class="icon"></span>Home</a>
  <a href="mode-select.html" class="active"><span data-icon="exam" class="icon"></span>CBT</a>
  <a href="calculator.html"><span data-icon="calculator" class="icon"></span>Calculator</a>
  <a href="leaderboard.html"><span data-icon="trophy" class="icon"></span>Rank</a>
  <a href="profile.html"><span data-icon="profile" class="icon"></span>Profile</a>
</div>

<script>
const SUBJECT_LABELS = {
  PUTME_CHEMISTRY: "Chemistry", PUTME_PHYSICS: "Physics", PUTME_BIOLOGY: "Biology",
  PUTME_ENGLISH: "English", PUTME_GENERAL_KNOWLEDGE: "General Knowledge", PUTME_MATHEMATICS: "Mathematics",
  PUTME_CRK: "CRK", PUTME_LITERATURE: "Literature in English", PUTME_ECONOMICS: "Economics", PUTME_COMMERCE: "Commerce", PUTME_GOVERNMENT: "Government"
};
const SUBJECT_ICONS = {
  PUTME_CHEMISTRY: "flask", PUTME_PHYSICS: "gear", PUTME_BIOLOGY: "dna",
  PUTME_ENGLISH: "book", PUTME_GENERAL_KNOWLEDGE: "globe", PUTME_MATHEMATICS: "calculator",
  PUTME_CRK: "document", PUTME_LITERATURE: "book", PUTME_ECONOMICS: "chart", PUTME_COMMERCE: "card"
};

let selectedSubjects = [];
let selectedTime = 30;
let subjectCounts = {}; // key -> count, preserved across toggles

document.querySelectorAll('.subject-card').forEach(card => {
  card.addEventListener('click', () => {
    const key = card.dataset.key;
    const idx = selectedSubjects.indexOf(key);
    if (idx >= 0) {
      selectedSubjects.splice(idx, 1);
      card.classList.remove('selected');
      card.querySelector('.check .icon').style.display = 'none';
    } else {
      selectedSubjects.push(key);
      card.classList.add('selected');
      card.querySelector('.check .icon').style.display = 'flex';
      if (!subjectCounts[key]) subjectCounts[key] = 20;
    }
    renderCountRows();
    document.getElementById('setupPanel').style.display = selectedSubjects.length > 0 ? 'block' : 'none';
  });
});

function renderCountRows(){
  const wrap = document.getElementById('perSubjectCounts');
  wrap.innerHTML = '';
  selectedSubjects.forEach(key => {
    const row = document.createElement('div');
    row.className = 'count-row';
    row.innerHTML = `
      <div class="cr-label"><span class="icon" data-icon="${SUBJECT_ICONS[key]}"></span>${SUBJECT_LABELS[key]}</div>
      <input type="number" min="5" max="60" value="${subjectCounts[key]}" data-subject="${key}">
    `;
    row.querySelector('input').addEventListener('input', (e) => {
      subjectCounts[key] = parseInt(e.target.value) || 0;
    });
    wrap.appendChild(row);
  });
  if (window.CodexIcons) window.CodexIcons.render();
}

document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTime = btn.dataset.time;
  });
});

document.getElementById('startBtn').addEventListener('click', () => {
  if (selectedSubjects.length === 0) { alert('Pick at least one subject.'); return; }

  for (const key of selectedSubjects) {
    const c = subjectCounts[key];
    if (!c || c < 5 || c > 60) {
      alert(`Enter a valid question count (5–60) for ${SUBJECT_LABELS[key]}.`);
      return;
    }
  }

  const params = new URLSearchParams();
  params.append('mode', 'custom');
  params.append('subjects', selectedSubjects.join(','));
  params.append('subjectCounts', selectedSubjects.map(k => subjectCounts[k]).join(','));
  params.append('time', selectedTime);
  window.location.href = 'putme_engine.html?' + params.toString();
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
<script src="js/icons.js"></script>
</body>
</html>
