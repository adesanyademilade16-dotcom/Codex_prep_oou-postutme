<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance — Codex PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .summary-box{padding:14px 8px;text-align:center}
  .summary-box b{display:block;font-size:1.2rem;font-weight:800;color:var(--violet)}
  .summary-box span{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:700}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .bar-row .lbl{width:92px;font-size:.78rem;font-weight:700;color:var(--ink2);flex:0 0 auto}
  .bar-track{flex:1;height:10px;background:var(--bg-soft);border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--violet2),var(--violet));border-radius:99px}
  .bar-pct{width:38px;text-align:right;font-size:.76rem;font-weight:700;color:var(--muted);flex:0 0 auto}

  .highlight-row{display:flex;gap:10px;margin-bottom:20px}
  .highlight-card{flex:1;padding:14px;text-align:center}
  .highlight-card .hi-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:4px}
  .highlight-card .hi-value{font-size:.92rem;font-weight:800}
  .highlight-card.strong .hi-value{color:var(--green)}
  .highlight-card.weak .hi-value{color:var(--red)}

  .history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px}
  .history-item .hi-left{font-size:.82rem;font-weight:700}
  .history-item .hi-sub{font-size:.7rem;color:var(--muted);margin-top:1px}
  .history-item .hi-score{font-size:.9rem;font-weight:800;color:var(--violet)}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:.86rem}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">Codex <span>PREP</span></div>
  <div class="spacer"></div>
  <a class="icon-btn" href="dashboard.html">← Dashboard</a>
</div>

<div class="page-wrap" id="authGate" style="padding-top:60px">
  <div class="loading-msg">Loading your performance...</div>
</div>

<div class="page-wrap" id="pageContent" style="display:none">
  <div class="page-header">
    <h1>Performance</h1>
    <p>Your progress, subject by subject.</p>
  </div>

  <div id="statsArea"></div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html"><span class="bn-icon" data-icon="home"></span>Home</a>
  <a href="mode-select.html"><span class="bn-icon" data-icon="exam"></span>CBT</a>
  <a href="calculator.html"><span class="bn-icon" data-icon="calculator"></span>Calculator</a>
  <a href="leaderboard.html"><span class="bn-icon" data-icon="trophy"></span>Rank</a>
  <a href="profile.html"><span class="bn-icon" data-icon="profile"></span>Profile</a>
</div>

<script type="module">
import { requireAuth, db, collection, query, where, getDocs } from "./js/auth.js";

const SUBJECT_LABELS = {
  PUTME_CHEMISTRY: "Chemistry", PUTME_PHYSICS: "Physics", PUTME_BIOLOGY: "Biology",
  PUTME_ENGLISH: "English", PUTME_GENERAL_KNOWLEDGE: "General Knowledge", PUTME_MATHEMATICS: "Mathematics",
  PUTME_CRK: "CRK", PUTME_LITERATURE: "Literature in English", PUTME_ECONOMICS: "Economics", PUTME_COMMERCE: "Commerce", PUTME_GOVERNMENT: "Government"
};

requireAuth(async (user) => {
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';

  const area = document.getElementById('statsArea');
  try {
    const q = query(collection(db, "putme_attempts"), where("uid", "==", user.uid));
    const snap = await getDocs(q);

    if (snap.empty) {
      area.innerHTML = `<div class="card empty">No CBT sessions completed yet.<br><br>
        <a href="mode-select.html" class="btn btn-primary" style="display:inline-block;margin-top:10px">Start practicing</a>
      </div>`;
      return;
    }

    const attempts = [];
    snap.forEach(d => attempts.push(d.data()));
    attempts.sort((a, b) => {
      const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
      const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
      return tb - ta;
    });

    // Overall summary
    const totalAttempts = attempts.length;
    const avgScore = Math.round(attempts.reduce((s, a) => s + (a.score || 0), 0) / totalAttempts);
    const bestScore = Math.max(...attempts.map(a => a.score || 0));

    // Per-subject accuracy, computed from individual question tags —
    // works correctly even for mixed Custom/Mock sessions.
    const subjectStats = {}; // key -> { correct, total }
    attempts.forEach(a => {
      (a.answers || []).forEach(ans => {
        const key = ans.subject || a.subject;
        if (!key) return;
        if (!subjectStats[key]) subjectStats[key] = { correct: 0, total: 0 };
        subjectStats[key].total++;
        if (ans.isCorrect) subjectStats[key].correct++;
      });
    });

    const subjectRows = Object.entries(subjectStats)
      .map(([key, s]) => ({ key, label: SUBJECT_LABELS[key] || key, pct: Math.round((s.correct / s.total) * 100), total: s.total }))
      .sort((a, b) => b.pct - a.pct);

    const strongest = subjectRows[0];
    const weakest = subjectRows[subjectRows.length - 1];

    let html = `
      <div class="summary-grid">
        <div class="card summary-box"><b>${totalAttempts}</b><span>Attempts</span></div>
        <div class="card summary-box"><b>${avgScore}%</b><span>Avg Score</span></div>
        <div class="card summary-box"><b>${bestScore}%</b><span>Best Score</span></div>
      </div>
    `;

    if (strongest && weakest && subjectRows.length > 1) {
      html += `
        <div class="highlight-row">
          <div class="card highlight-card strong">
            <div class="hi-label">Strongest</div>
            <div class="hi-value">${strongest.label} (${strongest.pct}%)</div>
          </div>
          <div class="card highlight-card weak">
            <div class="hi-label">Needs work</div>
            <div class="hi-value">${weakest.label} (${weakest.pct}%)</div>
          </div>
        </div>
      `;
    }

    if (subjectRows.length > 0) {
      html += `<div class="section-label" style="margin-top:0">Accuracy by subject</div><div class="card">`;
      subjectRows.forEach(s => {
        html += `
          <div class="bar-row">
            <span class="lbl">${s.label}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${s.pct}%"></div></div>
            <span class="bar-pct">${s.pct}%</span>
          </div>
        `;
      });
      html += `</div>`;
    }

    html += `<div class="section-label">Recent sessions</div>`;
    attempts.slice(0, 10).forEach(a => {
      const dateStr = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().toLocaleDateString() : '';
      const subjLabel = a.subject ? (SUBJECT_LABELS[a.subject] || a.subject) : (a.subjects || []).map(k => SUBJECT_LABELS[k] || k).join(', ');
      html += `
        <div class="card history-item">
          <div>
            <div class="hi-left">${subjLabel || 'Mixed'}</div>
            <div class="hi-sub">${dateStr} · ${a.totalQuestions || 0} questions</div>
          </div>
          <div class="hi-score">${a.score || 0}%</div>
        </div>
      `;
    });

    area.innerHTML = html;
  } catch (e) {
    area.innerHTML = '<div class="card empty">Could not load your performance data — check your connection and try again.</div>';
  }
});
</script>
<script src="js/icons.js"></script>
</body>
</html>
