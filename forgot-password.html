<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Codex PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">Codex <span>PREP</span></div>
  <div class="spacer"></div>
  <a class="icon-btn" href="login.html">← Log in</a>
</div>

<div class="page-wrap-narrow">
  <div class="page-header">
    <h1>Reset your password</h1>
    <p>We'll email you a reset link.</p>
  </div>

  <div class="card">
    <div class="form-status" id="formStatus"></div>
    <form id="resetForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Send reset link</button>
    </form>
  </div>
</div>

<script type="module">
import { auth, sendPasswordResetEmail } from "./js/auth.js";

const form = document.getElementById('resetForm');
const statusEl = document.getElementById('formStatus');
const submitBtn = document.getElementById('submitBtn');

function showStatus(msg, type){
  statusEl.textContent = msg;
  statusEl.className = 'form-status show ' + type;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';
  const email = document.getElementById('email').value.trim();

  try {
    await sendPasswordResetEmail(auth, email);
    showStatus('Reset link sent — check your inbox (and spam folder).', 'success');
  } catch (err) {
    // Don't reveal whether the email exists — generic message either way
    showStatus('If that email is registered, a reset link has been sent.', 'success');
  }
  submitBtn.disabled = false;
  submitBtn.textContent = 'Send reset link';
});
</script>
<script src="js/icons.js"></script>
</body>
</html>
