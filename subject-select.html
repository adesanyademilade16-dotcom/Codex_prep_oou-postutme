<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject Practice — Codex PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
  .subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .subject-card{padding:18px 14px;text-align:center;cursor:pointer;transition:.2s;border:1.5px solid var(--border)}
  .subject-card:hover{border-color:var(--violet2);transform:translateY(-2px)}
  .subject-card.selected{border-color:var(--violet);background:var(--blue-soft)}
  .subject-card .si{font-size:1.5rem;margin-bottom:6px}
  .subject-card .sn{font-size:.86rem;font-weight:700}

  #setupPanel{display:none;margin-top:6px}
  .time-options{display:flex;gap:8px;flex-wrap:wrap}
  .time-btn{
    flex:1;min-width:64px;padding:10px 6px;
    background:var(--bg-soft);border:1.5px solid var(--border);
    border-radius:9px;cursor:pointer;font-weight:700;font-size:.82rem;
    font-family:var(--font);color:var(--ink);
  }
  .time-btn.selected{background:var(--violet);color:#fff;border-color:var(--violet)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">Codex <span>PREP</span></div>
  <div class="spacer"></div>
  <a class="icon-btn" href="mode-select.html">← Modes</a>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h1>Subject Practice</h1>
    <p>Pick a subject to begin.</p>
  </div>

  <div class="subject-grid" id="subjectGrid">
    <div class="card subject-card" data-key="PUTME_CHEMISTRY">
      <div class="si" data-icon="flask"></div><div class="sn">Chemistry</div>
    </div>
    <div class="card subject-card" data-key="PUTME_PHYSICS">
      <div class="si" data-icon="gear"></div><div class="sn">Physics</div>
    </div>
    <div class="card subject-card" data-key="PUTME_BIOLOGY">
      <div class="si" data-icon="dna"></div><div class="sn">Biology</div>
    </div>
    <div class="card subject-card" data-key="PUTME_ENGLISH">
      <div class="si" data-icon="book"></div><div class="sn">English</div>
    </div>
    <div class="card subject-card" data-key="PUTME_GENERAL_KNOWLEDGE">
      <div class="si" data-icon="globe"></div><div class="sn">Gen. Knowledge</div>
    </div>
    <div class="card subject-card" data-key="PUTME_MATHEMATICS">
      <div class="si" data-icon="calculator"></div><div class="sn">Mathematics</div>
    </div>
    <div class="card subject-card" data-key="PUTME_CRK">
      <div class="si" data-icon="document"></div><div class="sn">CRK</div>
    </div>
    <div class="card subject-card" data-key="PUTME_LITERATURE">
      <div class="si" data-icon="book"></div><div class="sn">Lit-in-English</div>
    </div>
    <div class="card subject-card" data-key="PUTME_ECONOMICS">
      <div class="si" data-icon="chart"></div><div class="sn">Economics</div>
    </div>
    <div class="card subject-card" data-key="PUTME_COMMERCE">
      <div class="si" data-icon="card"></div><div class="sn">Commerce</div>
    </div>
  </div>

  <div class="card" id="setupPanel">
    <h3 style="font-size:.95rem;margin-bottom:16px" id="setupTitle">Set up your session</h3>
    <div class="field">
      <label for="qCount">Number of questions (10–50)</label>
      <input type="number" id="qCount" value="20" min="10" max="50">
    </div>
    <div class="field">
      <label>Time limit</label>
      <div class="time-options" id="timeOptions">
        <button type="button" class="time-btn" data-time="10">10 min</button>
        <button type="button" class="time-btn" data-time="15">15 min</button>
        <button type="button" class="time-btn selected" data-time="20">20 min</button>
        <button type="button" class="time-btn" data-time="30">30 min</button>
      </div>
    </div>
    <button class="btn btn-primary btn-block" id="startBtn">Start practice</button>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html"><span class="bn-icon" data-icon="home"></span>Home</a>
  <a href="mode-select.html" class="active"><span class="bn-icon" data-icon="exam"></span>CBT</a>
  <a href="calculator.html"><span class="bn-icon" data-icon="calculator"></span>Calculator</a>
  <a href="leaderboard.html"><span class="bn-icon" data-icon="trophy"></span>Rank</a>
  <a href="profile.html"><span class="bn-icon" data-icon="profile"></span>Profile</a>
</div>

<script>
const SUBJECT_LABELS = {
  PUTME_CHEMISTRY: "Chemistry", PUTME_PHYSICS: "Physics", PUTME_BIOLOGY: "Biology",
  PUTME_ENGLISH: "English", PUTME_GENERAL_KNOWLEDGE: "General Knowledge", PUTME_MATHEMATICS: "Mathematics",
  PUTME_CRK: "CRK", PUTME_LITERATURE: "Literature in English", PUTME_ECONOMICS: "Economics", PUTME_COMMERCE: "Commerce", PUTME_GOVERNMENT: "Government"
};
let selectedSubject = null;
let selectedTime = 20;

document.querySelectorAll('.subject-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedSubject = card.dataset.key;
    document.getElementById('setupTitle').textContent = `Set up: ${SUBJECT_LABELS[selectedSubject]}`;
    document.getElementById('setupPanel').style.display = 'block';
    document.getElementById('setupPanel').scrollIntoView({behavior:'smooth', block:'nearest'});
  });
});

document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTime = btn.dataset.time;
  });
});

document.getElementById('startBtn').addEventListener('click', () => {
  const count = parseInt(document.getElementById('qCount').value);
  if (!selectedSubject) { alert('Pick a subject first.'); return; }
  if (isNaN(count) || count < 10 || count > 50) { alert('Enter a question count between 10 and 50.'); return; }

  const params = new URLSearchParams();
  params.append('mode', 'subject');
  params.append('subject', selectedSubject);
  params.append('count', count);
  params.append('time', selectedTime);
  // putme_engine.html is the next build phase — this link is ready for it.
  window.location.href = 'putme_engine.html?' + params.toString();
});
</script>
<script src="js/icons.js"></script>
</body>
</html>
