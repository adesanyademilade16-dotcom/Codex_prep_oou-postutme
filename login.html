<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Codex PREP OOU Post-UTME</title>
<meta name="description" content="Log in to Codex PREP to continue your OOU Post-UTME CBT practice, track your progress, and access your saved study sessions.">
<link rel="canonical" href="https://codex-prep-oou-postutme.vercel.app/login.html">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">Codex <span>PREP</span></div>
  <div class="spacer"></div>
  <a class="icon-btn" href="index.html">← Home</a>
</div>

<div class="page-wrap-narrow">
  <div class="page-header">
    <h1>Welcome back</h1>
    <p>Log in to continue your prep.</p>
  </div>

  <div class="card">
    <button type="button" class="btn btn-ghost btn-block" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62Z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.95v2.33A9 9 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.16.28-1.7V4.97H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.03l3-2.33Z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .95 4.97l3 2.33C4.66 5.17 6.65 3.58 9 3.58Z"/></svg>
      Continue with Google
    </button>
    <div class="divider" style="margin:16px 0;position:relative;text-align:center">
      <span style="background:#fff;padding:0 10px;color:var(--muted);font-size:.76rem;position:relative;top:-11px">or log in with email</span>
    </div>
    <div class="form-status" id="formStatus"></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Log in</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:14px;font-size:.85rem">
    <a href="forgot-password.html" style="color:var(--violet);font-weight:700">Forgot password?</a>
  </p>
  <p style="text-align:center;margin-top:8px;font-size:.85rem;color:var(--muted)">
    New here? <a href="signup.html" style="color:var(--violet);font-weight:700">Create an account</a>
  </p>
</div>

<script type="module">
import { auth, signInWithEmailAndPassword, googleProvider, signInWithRedirect, getRedirectResult, ensureUserDoc } from "./js/auth.js";

const googleBtn = document.getElementById('googleBtn');
const statusEl = document.getElementById('formStatus');

function showStatus(msg, type){
  statusEl.textContent = msg;
  statusEl.className = 'form-status show ' + type;
}

getRedirectResult(auth).then(async (result) => {
  if (!result) return;
  googleBtn.disabled = true;
  googleBtn.textContent = 'Finishing sign-in...';
  const isComplete = await ensureUserDoc(result.user);
  window.location.href = isComplete ? 'dashboard.html' : 'complete-profile.html';
}).catch((err) => {
  console.error('Google redirect sign-in error:', err.code, err.message);
  showStatus('Google sign-in failed — please try again.', 'error');
});

googleBtn.addEventListener('click', () => {
  googleBtn.disabled = true;
  googleBtn.textContent = 'Connecting to Google...';
  signInWithRedirect(auth, googleProvider);
});

const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  submitBtn.textContent = 'Logging in...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'dashboard.html';
  } catch (err) {
    let msg = 'Something went wrong. Please try again.';
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
      msg = 'Incorrect email or password.';
    } else if (err.code === 'auth/too-many-requests') {
      msg = 'Too many attempts — please wait a moment and try again.';
    }
    showStatus(msg, 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Log in';
  }
});
</script>
<script src="js/icons.js"></script>
</body>
</html>
